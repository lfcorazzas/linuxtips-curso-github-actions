name: Entre jobs

on:
  workflow_dispatch

jobs:
  job_1:
    runs-on: ubuntu-latest
    steps:
      - name: Confere versão do Ubuntu
        run: cat /etc/os-release
      
      - name: Exibir uma mensagem
        run: echo "Estou fazendo o curso de Github Actions da Linuxtips!" > ${{ github.workspace }}/mensagem.txt

      - uses: actions/upload-artifact@v4
        with:
          name: strigus-upload
          path: ${{ github.workspace }}/mensagem.txt

  job_2:
    runs-on: ubuntu-latest
    needs: job_1
    steps:
      - name: Ver conteúdo do diretório
        run: ls -lha
        
      - uses: actions/download-artifact@v5
        with:
          name: strigus-upload
          path: strigus
      
      - name: Ver conteúdo do diretório
        run: ls -lha

      - name: Move arquivo
        run: mv strigus/mensagem.txt . && rm -rf ./strigus
      
      - name: Ver conteúdo do diretório
        run: ls -lha
      
      - name: Acessa arquivo
        run: cat mensagem.txt
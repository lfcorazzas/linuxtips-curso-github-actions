name: Primeiro Workflow Linuxtips

on:
  workflow_dispatch

jobs:
  job_1:
    runs-on: ubuntu-latest
    steps:
      - name: Confere versão do Ubuntu
        run: cat /etc/os-release
      
      - name: Exibir uma mensagem
        run: echo "Estou fazendo o curso de Github Actions da Linuxtips!" > mensagem.txt

      - uses: actions/upload-artifact@v4
        with:
          name: strigus
          path: /home/ubuntu/mensagem.txt

  job_2:
    runs-on: ubuntu-latest
    steps:
      - name: Ver conteúdo do diretório
        run: ls -lha
        
      - uses: actions/download-artifact@v5
        with:
          name: strigus
          path: mensagem.txt
      
      - name: Ver conteúdo do diretório
        run: ls -lha
        
      - name: Move arquivo
        run: mv strigus/mensagem.txt . && rm -rf ./strigus
      
      - name: Ver conteúdo do diretório
        run: ls -lha
      
      - name: Acessa arquivo
        run: cat mensagem.txt